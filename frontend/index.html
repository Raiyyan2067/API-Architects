<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>api</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" media="screen" href="styles/global.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header>
        <h1 id="page-title">API Architects</h1>
        <nav>
            <div class="adjacent">
                <button type="button" class="btn btn-warning" id="register-button">register</button>
                <button type="button" class="btn btn-success" id="login-button">login</button>
            </div>
            <button type="button" class="btn btn-danger" id="logout-button">logout</button>
        </nav>
    </header>
    <main>
        <form class="page" id="register-form">
            <h2>Register</h2>
            <div class="mb-3">
                <label for="register-form-username" class="form-label">Username</label>
                <input type="text" class="form-control" id="register-form-username">
            </div>
            <div class="mb-3">
                <label for="register-form-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="register-form-password">
            </div>
            <div class="mb-3">
                <label for="register-form-confirm" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="register-form-confirm">
            </div>
            <button type="submit" class="btn btn-success" id="register-form-submit">Submit</button>
        </form>
        <form class="page" id="login-form">
            <h2>Login</h2>
            <div class="mb-3">
                <label for="login-form-username" class="form-label">Username</label>
                <input type="text" class="form-control" id="login-form-username">
            </div>
            <div class="mb-3">
                <label for="login-form-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="login-form-password">
            </div>
            <button type="submit" class="btn btn-success" id="login-form-submit">Submit</button>
        </form>
        <form class="page" id="generate-form">
            <h2>Generate Despatch</h2>
            <div class="mb-3">
                <label for="generate-form-XML" class="form-label">Upload XML</label>
                <input class="form-control" type="file" id="generate-form-XML" accept=".xml">
            </div>
            <div class="mb-3">
                <label for="generate-form-carrier" class="form-label">Carrier</label>
                <input type="text" class="form-control" id="generate-form-carrier">
            </div>
            <div class="mb-3">
                <label for="generate-form-date" class="form-label">Date</label>
                <input type="date" class="form-control" id="generate-form-date">
            </div>
            <div class="mb-3">
                <label for="generate-form-notes" class="form-label">Notes</label>
                <input type="text" class="form-control" id="generate-form-notes">
            </div>
            <button type="submit" class="btn btn-success" id="generate-form-submit">Submit</button>
        </form>
        <div class="page" id="main-page">
            <button type="button" class="btn btn-success btn-lg" id="generate-button">
                Generate Despatch
            </button>
        </div>
    </main>
    <footer>
        <p>&copy; API-Architects 2026</p>
    </footer>
    <script type="module" src="src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
